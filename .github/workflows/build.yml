name: Build and Release Checkers

on:
  push:
    branches: [ main, develop ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]

jobs:
  # ========== СБОРКА НА WINDOWS (MinGW) ==========
  build-windows:
    name: Build on Windows (MinGW)
    runs-on: windows-latest
    if: github.event_name != 'push' || !startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Qt with MinGW
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.0'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_mingw'
          modules: 'qtwebsockets'
          setup-python: false

      - name: Install MinGW via Chocolatey
        run: |
          choco install mingw -y
          echo "C:\ProgramData\mingw64\mingw64\bin" >> $env:GITHUB_PATH

      - name: Build with qmake (MinGW)
        run: |
          mkdir build
          cd build
          qmake ../Checkers.pro -spec win32-g++
          mingw32-make

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: checkers-windows
          path: build/release/checkers.exe

  # ========== СБОРКА НА UBUNTU ==========
  build-ubuntu:
    name: Build on Ubuntu
    runs-on: ubuntu-latest
    if: github.event_name != 'push' || !startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            qt6-base-dev \
            qt6-tools-dev \
            qt6-tools-dev-tools \
            libgl1-mesa-dev

      - name: Build with qmake
        run: |
          mkdir build
          cd build
          qmake6 ../Checkers.pro
          make -j$(nproc)

      - name: Upload Ubuntu artifact
        uses: actions/upload-artifact@v4
        with:
          name: checkers-ubuntu
          path: build/checkers

  # ========== СОЗДАНИЕ RELEASE ==========
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-windows, build-ubuntu]
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/checkers-windows/checkers.exe
            artifacts/checkers-ubuntu/checkers
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}